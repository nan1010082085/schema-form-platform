services:
  postgres:
    image: postgres:16
    container_name: formgrid-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: formgrid
      POSTGRES_PASSWORD: formgrid
      POSTGRES_DB: formgrid
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
