<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyFlow Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white; z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .logo { width: 80px; height: 80px; margin-bottom: 24px; animation: pulse 2s ease-in-out infinite; }
    .title { font-size: 28px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; }
    .subtitle { font-size: 14px; opacity: 0.8; margin-bottom: 32px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  </style>
</head>
<body>
  <div id="loading">
    <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="10" width="35" height="35" rx="8" fill="rgba(255,255,255,0.9)"/>
      <rect x="55" y="10" width="35" height="35" rx="8" fill="rgba(255,255,255,0.6)"/>
      <rect x="10" y="55" width="35" height="35" rx="8" fill="rgba(255,255,255,0.6)"/>
      <rect x="55" y="55" width="35" height="35" rx="8" fill="rgba(255,255,255,0.3)"/>
      <path d="M45 27.5 L55 27.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M27.5 45 L27.5 55" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="title">PyFlow Flow</div>
    <div class="subtitle">BPMN 流程设计器</div>
    <div class="spinner"></div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    const observer = new MutationObserver(() => {
      const app = document.getElementById('app');
      if (app && app.children.length > 0) {
        document.getElementById('loading').classList.add('hidden');
        setTimeout(() => document.getElementById('loading').remove(), 300);
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('app'), { childList: true });
  </script>
</body>
</html>
